<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1200" />
  <title>Veela Launch Card — Coming to Indonesia</title>
  <link rel="stylesheet" href="../../design-system/tokens.css" />
  <link rel="stylesheet" href="../../templates/launch-card/template-v02.css" />
</head>
<body>

<div class="launch-card">
  <div class="grid-overlay"></div>
  <div class="top-bar"></div>

  <div class="card-content">
    <div class="lc-logo">
      <img src="../../brand/veela-logo-cream.svg" alt="Veela" />
    </div>

    <div class="lc-brand-name">Veela</div>

    <h1 class="lc-headline">
      Nutrition. <span class="arabic-word">يُشفى.</span> One function per formula.
    </h1>

    <p class="lc-tagline">Monoprotein freeze-dried cat nutrition — built for clarity.</p>

    <div class="lc-launch-badge">
      <div class="lc-launch-dot"></div>
      <span class="lc-launch-text">Coming to Indonesia</span>
    </div>

    <a href="https://veela.pet/book" class="lc-cta">Schedule a call</a>
  </div>

  <footer class="lc-footer">
    <span class="lc-footer-url">veela.pet</span>
    <span class="lc-market-pill">Indonesia Launch</span>
    <span class="lc-footer-email">mayur@veela.pet</span>
  </footer>
</div>
</body>
</html>
