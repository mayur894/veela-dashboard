<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEELA — Roadmap Dashboard</title>
  <style>
    :root {
      --bg:#0b0f14; --panel:#121922; --panel2:#17212c; --border:#233142;
      --text:#d9e3ee; --muted:#8ca0b3; --teal:#19b6b0; --green:#22c55e;
      --amber:#f59e0b; --red:#ef4444; --blue:#60a5fa; --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:14px/1.45 Inter,system-ui,sans-serif; }
    .wrap { max-width:1320px; margin:0 auto; padding:18px; }
    .topbar, .card { background:var(--panel); border:1px solid var(--border); border-radius:14px; }
    .topbar { padding:16px 18px; margin-bottom:16px; display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; }
    .brand { font:700 20px var(--mono); color:var(--teal); letter-spacing:.08em; }
    .sub { color:var(--muted); margin-top:4px; }
    .badges, .stats, .chips { display:flex; gap:8px; flex-wrap:wrap; }
    .badge, .chip, .tab { border:1px solid var(--border); background:var(--panel2); color:var(--text); border-radius:999px; padding:6px 10px; font:12px var(--mono); }
    .badge.red,.pill.red { color:#fecaca; border-color:#7f1d1d; background:#311417; }
    .badge.amber,.pill.amber { color:#fde68a; border-color:#78350f; background:#2c1b08; }
    .badge.green,.pill.green { color:#bbf7d0; border-color:#14532d; background:#102116; }
    .badge.teal { color:#99f6e4; border-color:#115e59; background:#0f2120; }
    .grid { display:grid; gap:16px; }
    .grid-3 { grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); }
    .grid-2 { grid-template-columns:repeat(auto-fit,minmax(340px,1fr)); }
    .card { padding:16px; }
    h2 { margin:0 0 12px; font-size:15px; font-family:var(--mono); color:var(--teal); text-transform:uppercase; letter-spacing:.06em; }
    h3 { margin:0 0 6px; font-size:15px; }
    p { margin:0; }
    .muted { color:var(--muted); }
    .kpi { font:700 28px var(--mono); margin-top:4px; }
    .small { font-size:12px; color:var(--muted); }
    .pill { display:inline-block; padding:4px 8px; border-radius:999px; font:11px var(--mono); }
    .list { display:grid; gap:10px; }
    .item { background:var(--panel2); border:1px solid var(--border); border-radius:12px; padding:12px; }
    .item-head { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; margin-bottom:8px; }
    .tabs { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
    .tab { cursor:pointer; }
    .tab.active { border-color:var(--teal); color:var(--teal); }
    .hidden { display:none; }
    ul { margin:8px 0 0 18px; padding:0; }
    li { margin:4px 0; }
    .gate-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:12px; }
    .activity { display:grid; gap:8px; }
    .activity-row { display:grid; grid-template-columns:130px 80px 1fr; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
    .activity-row:last-child { border-bottom:none; }
    .time,.agent { font:12px var(--mono); color:var(--muted); }
    .agent { color:var(--teal); }
    @media (max-width:700px){ .activity-row{grid-template-columns:1fr; gap:4px;} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="brand">VEELA</div>
        <div class="sub" id="subtitle">Roadmap dashboard</div>
      </div>
      <div class="stats" id="top-stats"></div>
    </div>

    <div class="grid grid-3">
      <div class="card"><h2>Status</h2><div class="kpi" id="overall-status">--</div><div class="small" id="overall-label"></div></div>
      <div class="card"><h2>Phase</h2><div class="kpi" id="phase-name">--</div><div class="small" id="phase-label"></div></div>
      <div class="card"><h2>Cadence</h2><div class="kpi">W / M / Y</div><div class="small" id="cadence"></div></div>
    </div>

    <div class="card" style="margin-top:16px;">
      <h2>Priority Themes</h2>
      <div class="chips" id="priority-themes"></div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;">
        <h2 style="margin:0;">Roadmap Views</h2>
        <div class="tabs">
          <button class="tab active" data-view="weekly">Weekly</button>
          <button class="tab" data-view="monthly">Monthly</button>
          <button class="tab" data-view="yearly">Yearly</button>
        </div>
      </div>
      <div id="roadmap-panels">
        <div id="view-weekly" class="list"></div>
        <div id="view-monthly" class="list hidden"></div>
        <div id="view-yearly" class="list hidden"></div>
      </div>
    </div>

    <div class="grid grid-2" style="margin-top:16px;">
      <div class="card">
        <h2>Launch Gates</h2>
        <div class="gate-grid" id="launch-gates"></div>
      </div>
      <div class="card">
        <h2>Top Blockers</h2>
        <div class="list" id="top-blockers"></div>
      </div>
    </div>

    <div class="grid grid-2" style="margin-top:16px;">
      <div class="card">
        <h2>Market Sequence</h2>
        <div class="list" id="market-sequence"></div>
      </div>
      <div class="card">
        <h2>Activity</h2>
        <div class="activity" id="activity"></div>
      </div>
    </div>
  </div>

  <script>
    const statusClass = (s='').toLowerCase().includes('green') || s==='done' ? 'green' :
      (s.toLowerCase().includes('amber') || s==='conditional' || s==='upcoming' || s==='next' || s==='warning') ? 'amber' :
      (s==='active' ? 'teal' : 'red');

    const pill = (text, status) => `<span class="pill ${statusClass(status)}">${text}</span>`;

    function renderList(el, items, mapper) {
      el.innerHTML = items.map(mapper).join('');
    }

    function renderRoadmapSection(el, entries, type) {
      renderList(el, entries, entry => {
        const bullets = type === 'yearly' ? entry.chapters : entry.must_win || entry.focus || [];
        const exit = entry.exit_criteria ? `<div class="small" style="margin-top:8px;"><strong>Exit criteria</strong></div><ul>${entry.exit_criteria.map(x=>`<li>${x}</li>`).join('')}</ul>` : '';
        const success = entry.success_definition ? `<div class="small" style="margin-top:8px;"><strong>Success definition</strong>: ${entry.success_definition}</div>` : '';
        const gates = entry.gates_in_play ? `<div class="small" style="margin-top:8px;">Gates in play: ${entry.gates_in_play.join(', ')}</div>` : '';
        return `<div class="item">
          <div class="item-head">
            <div>
              <div class="small">${entry.id}</div>
              <h3>${entry.label}</h3>
            </div>
            ${pill((entry.status || '').toUpperCase(), entry.status)}
          </div>
          <div>${entry.goal || entry.objective || ''}</div>
          ${bullets.length ? `<ul>${bullets.map(x=>`<li>${x}</li>`).join('')}</ul>` : ''}
          ${gates}
          ${exit}
          ${success}
        </div>`;
      });
    }

    async function init() {
      const res = await fetch('./dashboard-data.json', { cache: 'no-store' });
      const data = await res.json();

      document.getElementById('subtitle').textContent = `${data.summary.program} · updated ${data._meta.last_updated}`;
      document.getElementById('overall-status').textContent = data.summary.overall_status.toUpperCase();
      document.getElementById('overall-status').className = `kpi ${statusClass(data.summary.overall_status)}`;
      document.getElementById('overall-label').textContent = data.summary.overall_status_label;
      document.getElementById('phase-name').textContent = data.summary.current_phase;
      document.getElementById('phase-label').textContent = data.summary.current_phase_label;
      document.getElementById('cadence').textContent = data.summary.review_cadence;

      document.getElementById('top-stats').innerHTML = `
        <span class="badge ${statusClass(data.summary.overall_status)}">${data.summary.overall_status.toUpperCase()}</span>
        <span class="badge teal">${data.summary.planning_horizon}</span>
        <span class="badge teal">v${data._meta.version}</span>
      `;

      document.getElementById('priority-themes').innerHTML = data.roadmap.priority_themes
        .map(t => `<span class="chip">${t}</span>`).join('');

      renderRoadmapSection(document.getElementById('view-weekly'), data.roadmap.weekly, 'weekly');
      renderRoadmapSection(document.getElementById('view-monthly'), data.roadmap.monthly, 'monthly');
      renderRoadmapSection(document.getElementById('view-yearly'), data.roadmap.yearly, 'yearly');

      renderList(document.getElementById('launch-gates'), data.launch_gates, g => `
        <div class="item">
          <div class="item-head">
            <div><div class="small">${g.id}</div><h3>${g.name}</h3></div>
            ${pill(g.status.toUpperCase(), g.status)}
          </div>
          <div class="small">Owner: ${g.owner}</div>
          <div style="margin-top:8px;">${g.current_note}</div>
          <div class="small" style="margin-top:8px;"><strong>Green when:</strong> ${g.turns_green_when}</div>
        </div>`);

      renderList(document.getElementById('top-blockers'), data.top_blockers, b => `
        <div class="item">
          <div class="item-head">
            <div><div class="small">${b.id}</div><h3>${b.title}</h3></div>
            ${pill(b.urgency.toUpperCase(), b.urgency)}
          </div>
          <div class="small">Owner: ${b.owner}</div>
          <div style="margin-top:8px;">${b.impact}</div>
        </div>`);

      renderList(document.getElementById('market-sequence'), data.market_sequence, m => `
        <div class="item">
          <div class="item-head">
            <div><div class="small">Rank ${m.rank}</div><h3>${m.market}</h3></div>
            ${pill(m.status, m.status)}
          </div>
          <div>${m.why_now}</div>
          <div class="small" style="margin-top:8px;"><strong>Main gate:</strong> ${m.main_gate}</div>
        </div>`);

      document.getElementById('activity').innerHTML = data.activity.map(a => `
        <div class="activity-row">
          <div class="time">${a.time} UTC</div>
          <div class="agent">${a.agent}</div>
          <div>${a.msg}</div>
        </div>`).join('');

      document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
          btn.classList.add('active');
          document.querySelectorAll('[id^="view-"]').forEach(x => x.classList.add('hidden'));
          document.getElementById(`view-${btn.dataset.view}`).classList.remove('hidden');
        });
      });
    }

    init().catch(err => {
      document.body.innerHTML = `<div class="wrap"><div class="card"><h2>Dashboard load error</h2><p>${err.message}</p></div></div>`;
      console.error(err);
    });
  </script>
</body>
</html>
